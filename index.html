<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafbfc;
    --surface: #ffffff;
    --surface-2: #f4f5f7;
    --surface-3: #eef0f3;
    --border: #e6e8ec;
    --border-strong: #d2d6dc;
    --text: #1d1d1f;
    --text-soft: #6e6e73;
    --text-mute: #a1a1a6;
    --accent: #00b8d4;
    --accent-deep: #0091a7;
    --accent-soft: #e0f7fb;
    --danger: #d9342b;
    --success: #34c759;
    --warn: #ff9500;
    --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.04);
    --shadow-md: 0 4px 16px rgba(16, 24, 40, 0.06);
    --shadow-lg: 0 12px 40px rgba(16, 24, 40, 0.10);
    --radius-sm: 10px;
    --radius: 16px;
    --radius-lg: 22px;
    --overlay: rgba(16, 24, 40, 0.32);
  }

  [data-theme="dark"] {
    --bg: #0b0d10;
    --surface: #16181d;
    --surface-2: #1c1f25;
    --surface-3: #242830;
    --border: #262a31;
    --border-strong: #353a43;
    --text: #f5f5f7;
    --text-soft: #a1a1a6;
    --text-mute: #6e6e73;
    --accent: #22d3ee;
    --accent-deep: #67e8f9;
    --accent-soft: rgba(34, 211, 238, 0.14);
    --danger: #ff6b6b;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
    --overlay: rgba(0, 0, 0, 0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
    transition: background 0.3s ease, color 0.3s ease;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, var(--accent-soft), transparent),
      var(--bg);
  }

  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 32px 32px 120px;
  }

  /* Top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    gap: 12px;
  }

  .icon-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
  }

  .icon-btn:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }

  .icon-btn svg { width: 20px; height: 20px; }

  .current-tab {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-soft);
  }

  .current-tab .sep { opacity: 0.4; }

  .current-tab .now {
    color: var(--text);
    font-weight: 600;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 24px;
  }

  .title-block h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(40px, 5.5vw, 60px);
    line-height: 1;
    letter-spacing: -0.025em;
  }

  .title-block h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .title-block p {
    color: var(--text-soft);
    margin-top: 10px;
    font-size: 15px;
  }

  .summary-pill {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 22px;
    border-radius: 999px;
    box-shadow: var(--shadow-sm);
  }

  .summary-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .summary-pill .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-soft);
  }

  .summary-pill .value {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    font-weight: 400;
    letter-spacing: -0.02em;
  }

  /* Budget banner */
  .budget-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 24px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: var(--shadow-sm);
  }

  .budget-banner.over {
    border-color: var(--danger);
    background: linear-gradient(to right, rgba(217,52,43,0.04), var(--surface));
  }

  .budget-info {
    flex: 1;
    min-width: 200px;
  }

  .budget-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-soft);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .budget-amounts {
    display: flex;
    gap: 18px;
    align-items: baseline;
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    letter-spacing: -0.02em;
    flex-wrap: wrap;
  }

  .budget-amounts .spent { color: var(--text); }
  .budget-amounts .of { color: var(--text-mute); font-size: 16px; }
  .budget-amounts .total { color: var(--text-soft); }

  .budget-progress {
    flex: 2;
    min-width: 240px;
  }

  .budget-bar-head {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 8px;
  }

  .budget-bar-head .pct {
    font-weight: 600;
    color: var(--accent-deep);
  }

  .budget-bar-head .remaining {
    color: var(--text-soft);
  }

  .budget-bar-head .remaining strong { color: var(--text); }

  .budget-bar {
    height: 10px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }

  .budget-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-deep));
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .budget-bar-fill.warn { background: linear-gradient(90deg, var(--warn), #ff6b35); }
  .budget-bar-fill.danger { background: linear-gradient(90deg, var(--danger), #ff4040); }

  .budget-edit {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .budget-edit input {
    width: 140px;
    padding: 10px 14px 10px 34px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface-2);
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }

  .budget-edit-wrap { position: relative; }
  .budget-edit-wrap::before {
    content: 'R$';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-mute);
    font-size: 12px;
    font-weight: 500;
    pointer-events: none;
  }

  .budget-edit input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
    background: var(--surface);
  }

  /* Menu sheet */
  .menu-overlay {
    position: fixed;
    inset: 0;
    background: var(--overlay);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 90;
    backdrop-filter: blur(4px);
  }

  .menu-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .menu {
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    width: min(360px, 86vw);
    background: var(--surface);
    border-right: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    z-index: 100;
    transform: translateX(-100%);
    transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    display: flex;
    flex-direction: column;
  }

  .menu.open { transform: translateX(0); }

  .menu-head {
    padding: 24px 24px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .menu-head h2 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 28px;
    letter-spacing: -0.02em;
  }

  .menu-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .menu-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-mute);
    font-weight: 600;
    padding: 12px 12px 6px;
  }

  .menu-item {
    width: 100%;
    border: none;
    background: transparent;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: background 0.15s;
    text-align: left;
  }

  .menu-item:hover { background: var(--surface-2); }

  .menu-item.active {
    background: var(--text);
    color: var(--surface);
  }

  .menu-item .mi-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .menu-item.active .mi-icon {
    background: rgba(255,255,255,0.12);
  }

  [data-theme="dark"] .menu-item.active .mi-icon {
    background: rgba(0,0,0,0.3);
  }

  .menu-item .mi-label { flex: 1; }

  .menu-item .mi-count {
    font-size: 12px;
    color: var(--text-mute);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  .menu-item.active .mi-count {
    color: rgba(255,255,255,0.7);
  }

  [data-theme="dark"] .menu-item.active .mi-count {
    color: rgba(0,0,0,0.6);
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search {
    flex: 1;
    min-width: 220px;
    position: relative;
  }

  .search input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    transition: all 0.2s;
  }

  .search input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .search svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-mute);
  }

  .btn {
    padding: 12px 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }

  .btn.primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .btn.danger:hover {
    color: var(--danger);
    border-color: var(--danger);
  }

  /* Items grid */
  .items {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
  }

  .item:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-md);
  }

  .item.checked {
    background: var(--surface-2);
  }

  .item.checked .item-name {
    text-decoration: line-through;
    color: var(--text-mute);
  }

  .check {
    position: relative;
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    cursor: pointer;
  }

  .check input {
    position: absolute;
    opacity: 0;
    width: 100%; height: 100%;
    margin: 0;
    cursor: pointer;
  }

  .check .box {
    width: 24px;
    height: 24px;
    border: 1.5px solid var(--border-strong);
    border-radius: 8px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .check input:checked + .box {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check .box svg {
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s ease;
    color: white;
  }

  [data-theme="dark"] .check input:checked + .box svg { color: #0b0d10; }

  .check input:checked + .box svg {
    opacity: 1;
    transform: scale(1);
  }

  .item-info {
    flex: 1;
    min-width: 0;
  }

  .item-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-cat {
    font-size: 11px;
    color: var(--text-mute);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .price-input {
    position: relative;
    width: 110px;
    flex-shrink: 0;
  }

  .price-input::before {
    content: 'R$';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--text-mute);
    font-weight: 500;
    pointer-events: none;
  }

  .price-input input {
    width: 100%;
    padding: 8px 10px 8px 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface-2);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    text-align: right;
    transition: all 0.15s;
  }

  .price-input input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .remove-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    border-radius: 8px;
    color: var(--text-mute);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .item:hover .remove-btn { display: flex; }
  .remove-btn:hover { background: var(--surface-3); color: var(--danger); }

  /* Dashboard */
  .dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  @media (max-width: 760px) {
    .dashboard { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: var(--shadow-sm);
  }

  .card-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-soft);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .total-value {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 64px;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-top: 6px;
  }

  .total-value .currency {
    font-size: 28px;
    color: var(--text-soft);
    margin-right: 8px;
    vertical-align: 18px;
  }

  .total-meta {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px dashed var(--border);
    display: flex;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .meta-item .label {
    font-size: 12px;
    color: var(--text-soft);
    margin-bottom: 4px;
  }

  .meta-item .val {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .meta-item .val.accent { color: var(--accent-deep); }
  .meta-item .val.danger { color: var(--danger); }

  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-top: 16px;
  }

  .donut {
    width: 170px;
    height: 170px;
    flex-shrink: 0;
    position: relative;
  }

  .donut-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .donut-center .num {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    line-height: 1;
  }

  .donut-center .lbl {
    font-size: 11px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  .legend {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }

  .legend-row .sw {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-row .name {
    flex: 1;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .legend-row .pct {
    color: var(--text-soft);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  .breakdown {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 20px;
  }

  .bar-row .bar-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .bar-row .bar-head .n {
    font-size: 14px;
    font-weight: 500;
  }

  .bar-row .bar-head .v {
    font-size: 13px;
    color: var(--text-soft);
    font-variant-numeric: tabular-nums;
  }

  .bar-row .bar-head .v strong {
    color: var(--text);
    font-weight: 600;
    margin-right: 8px;
  }

  .bar-track {
    height: 8px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
  }

  .empty .ico {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .empty .cta { margin-top: 16px; }

  .add-form {
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
    display: none;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .add-form.open { display: flex; }

  .add-form input, .add-form select {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
  }

  .add-form input:focus, .add-form select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .add-form input[type="text"] { flex: 1; min-width: 180px; }

  /* Minhas notas */
  .notes-head {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .notes-head input {
    flex: 1;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    transition: all 0.2s;
  }

  .notes-head input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .notes-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .note {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
  }

  .note:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-md);
  }

  .note.done { background: var(--surface-2); }
  .note.done .note-text {
    text-decoration: line-through;
    color: var(--text-mute);
  }

  .note-text {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    border: none;
    background: transparent;
    font-family: inherit;
    padding: 4px 0;
    outline: none;
    min-width: 0;
  }

  .note-text:focus { color: var(--text); }

  @media (max-width: 600px) {
    .app { padding: 24px 16px 80px; }
    .item { flex-wrap: wrap; }
    .price-input { width: 100%; order: 3; }
    .total-value { font-size: 48px; }
    .total-value .currency { font-size: 22px; vertical-align: 14px; }
    .budget-banner { flex-direction: column; align-items: stretch; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeUp 0.3s ease both; }

  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="icon-btn" id="menuBtn" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="current-tab">
      <span class="sep">/</span>
      <span class="now" id="currentTabLabel">Todos</span>
    </div>
    <button class="icon-btn" id="themeBtn" aria-label="Alternar tema">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </div>

  <header>
    <div class="title-block">
      <h1>Lista de <em>compras</em></h1>
      <p>Organize seu mercado com elegância e precisão</p>
    </div>
    <div class="summary-pill">
      <span class="dot"></span>
      <div>
        <div class="label">Total no carrinho</div>
        <div class="value" id="pillTotal">R$ 0,00</div>
      </div>
    </div>
  </header>

  <!-- Budget banner -->
  <div class="budget-banner" id="budgetBanner">
    <div class="budget-info">
      <div class="budget-title">Orçamento</div>
      <div class="budget-amounts">
        <span class="spent" id="bSpent">R$ 0,00</span>
        <span class="of">de</span>
        <span class="total" id="bTotal">—</span>
      </div>
    </div>
    <div class="budget-progress" id="bProgress">
      <div class="budget-bar-head">
        <span class="pct" id="bPct">0%</span>
        <span class="remaining" id="bRemaining">Defina um orçamento</span>
      </div>
      <div class="budget-bar"><div class="budget-bar-fill" id="bFill" style="width:0%"></div></div>
    </div>
    <div class="budget-edit">
      <div class="budget-edit-wrap">
        <input type="text" inputmode="decimal" id="budgetInput" placeholder="0,00">
      </div>
    </div>
  </div>

  <!-- Resumo -->
  <div class="view" id="view-resumo">
    <div class="dashboard">
      <div class="card">
        <div class="card-title">Total da compra</div>
        <div class="total-value"><span class="currency">R$</span><span id="bigTotal">0,00</span></div>
        <div class="total-meta">
          <div class="meta-item">
            <div class="label">Itens no carrinho</div>
            <div class="val accent" id="metaCount">0</div>
          </div>
          <div class="meta-item">
            <div class="label">Preço médio</div>
            <div class="val" id="metaAvg">R$ 0,00</div>
          </div>
          <div class="meta-item">
            <div class="label">Categorias</div>
            <div class="val" id="metaCats">0</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Distribuição</div>
        <div class="donut-wrap">
          <div class="donut">
            <svg viewBox="0 0 100 100" width="170" height="170" id="donutSvg">
              <circle cx="50" cy="50" r="42" fill="none" stroke="var(--surface-2)" stroke-width="12"/>
            </svg>
            <div class="donut-center">
              <div class="num" id="donutNum">0</div>
              <div class="lbl">itens</div>
            </div>
          </div>
          <div class="legend" id="legend"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Balanço por categoria</div>
      <div class="breakdown" id="breakdown"></div>
    </div>
  </div>

  <!-- Items view -->
  <div class="view" id="view-items">
    <div class="toolbar">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar item...">
      </div>
      <button class="btn" id="addBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Novo item
      </button>
      <button class="btn danger" id="resetBtn">Limpar carrinho</button>
    </div>
    <div class="add-form" id="addForm">
      <input type="text" id="newName" placeholder="Nome do item">
      <select id="newCat"></select>
      <button class="btn primary" id="saveNew">Adicionar</button>
      <button class="btn" id="cancelNew">Cancelar</button>
    </div>
    <div class="items" id="itemsGrid"></div>
  </div>

  <!-- Notes view -->
  <div class="view" id="view-notes">
    <div class="notes-head">
      <input type="text" id="noteInput" placeholder="Não esquecer de comprar... (Enter para adicionar)">
      <button class="btn primary" id="addNoteBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Adicionar
      </button>
    </div>
    <div class="notes-list" id="notesList"></div>
  </div>
</div>

<!-- Menu sheet -->
<div class="menu-overlay" id="menuOverlay"></div>
<nav class="menu" id="menu" aria-hidden="true">
  <div class="menu-head">
    <h2>Menu</h2>
    <button class="icon-btn" id="closeMenuBtn" aria-label="Fechar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="menu-list" id="menuList"></div>
</nav>

<script>
  const CATEGORIES = {
    hortifruti:  { name: 'Hortifruti',   color: '#34c759', icon: '🥬' },
    acougue:     { name: 'Açougue',      color: '#ff3b30', icon: '🥩' },
    padaria:     { name: 'Padaria',      color: '#ffb84d', icon: '🥖' },
    laticinios:  { name: 'Laticínios',   color: '#64d2ff', icon: '🥛' },
    mercearia:   { name: 'Mercearia',    color: '#af52de', icon: '🍚' },
    bebidas:     { name: 'Bebidas',      color: '#00b8d4', icon: '🍷' },
    congelados:  { name: 'Congelados',   color: '#5ac8fa', icon: '🧊' },
    higiene:     { name: 'Higiene',      color: '#ff9500', icon: '🧼' },
    limpeza:     { name: 'Limpeza',      color: '#007aff', icon: '🧽' },
    animais:     { name: 'Animais',      color: '#a2845e', icon: '🐾' },
  };

  const DEFAULT_ITEMS = [
    'Banana','Maçã','Laranja','Tomate','Alface','Cebola','Batata','Cenoura','Alho','Limão','Abacate','Mamão','Pimentão',
    'Alcatra','Patinho','Frango inteiro','Peito de frango','Coxa de frango','Linguiça','Carne moída','Costela','Picanha','Bacon',
    'Pão francês','Pão de forma','Pão de queijo','Bolo','Baguete','Torrada','Croissant',
    'Leite','Queijo mussarela','Queijo prato','Iogurte','Manteiga','Requeijão','Creme de leite','Leite condensado','Ovos',
    'Arroz','Feijão','Macarrão','Açúcar','Sal','Óleo de soja','Azeite','Café','Farinha de trigo','Farinha de mandioca','Molho de tomate','Vinagre','Aveia','Cereal',
    'Água mineral','Refrigerante','Suco de laranja','Cerveja','Vinho','Energético','Chá gelado',
    'Pizza congelada','Hambúrguer','Nuggets','Sorvete','Batata frita congelada','Legumes congelados',
    'Sabonete','Shampoo','Condicionador','Pasta de dente','Escova de dente','Desodorante','Papel higiênico','Absorvente','Fio dental','Protetor solar',
    'Detergente','Sabão em pó','Amaciante','Água sanitária','Desinfetante','Esponja','Saco de lixo','Papel toalha','Limpa vidros','Multiuso',
    'Ração para cachorro','Ração para gato','Areia para gato','Petisco cachorro','Petisco gato','Shampoo pet'
  ];

  const catsOrder = ['hortifruti','acougue','padaria','laticinios','mercearia','bebidas','congelados','higiene','limpeza','animais'];
  const itemGroups = [
    ['Banana','Maçã','Laranja','Tomate','Alface','Cebola','Batata','Cenoura','Alho','Limão','Abacate','Mamão','Pimentão'],
    ['Alcatra','Patinho','Frango inteiro','Peito de frango','Coxa de frango','Linguiça','Carne moída','Costela','Picanha','Bacon'],
    ['Pão francês','Pão de forma','Pão de queijo','Bolo','Baguete','Torrada','Croissant'],
    ['Leite','Queijo mussarela','Queijo prato','Iogurte','Manteiga','Requeijão','Creme de leite','Leite condensado','Ovos'],
    ['Arroz','Feijão','Macarrão','Açúcar','Sal','Óleo de soja','Azeite','Café','Farinha de trigo','Farinha de mandioca','Molho de tomate','Vinagre','Aveia','Cereal'],
    ['Água mineral','Refrigerante','Suco de laranja','Cerveja','Vinho','Energético','Chá gelado'],
    ['Pizza congelada','Hambúrguer','Nuggets','Sorvete','Batata frita congelada','Legumes congelados'],
    ['Sabonete','Shampoo','Condicionador','Pasta de dente','Escova de dente','Desodorante','Papel higiênico','Absorvente','Fio dental','Protetor solar'],
    ['Detergente','Sabão em pó','Amaciante','Água sanitária','Desinfetante','Esponja','Saco de lixo','Papel toalha','Limpa vidros','Multiuso'],
    ['Ração para cachorro','Ração para gato','Areia para gato','Petisco cachorro','Petisco gato','Shampoo pet']
  ];
  const ITEM_CAT = {};
  itemGroups.forEach((group, i) => group.forEach(name => { ITEM_CAT[name] = catsOrder[i]; }));

  let state = {
    items: {},
    notes: [],
    budget: 0,
    active: 'todos',
    theme: 'light'
  };

  function slugify(s) {
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  }
  function formatBRL(n) {
    return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function parsePrice(s) {
    if (typeof s === 'number') return s;
    if (!s) return 0;
    const clean = String(s).replace(/[^0-9,.-]/g,'').replace(/\./g,'').replace(',','.');
    const n = parseFloat(clean);
    return isNaN(n) ? 0 : n;
  }

  const STORE_KEY = 'shopping-list-v2';

  async function save() {
    const payload = JSON.stringify({
      items: state.items, notes: state.notes, budget: state.budget, theme: state.theme
    });
    try {
      if (window.storage) await window.storage.set(STORE_KEY, payload);
      else sessionStorage.setItem(STORE_KEY, payload);
    } catch(e) {}
  }

  async function load() {
    try {
      if (window.storage) {
        const r = await window.storage.get(STORE_KEY);
        return r ? JSON.parse(r.value) : null;
      } else {
        const r = sessionStorage.getItem(STORE_KEY);
        return r ? JSON.parse(r) : null;
      }
    } catch(e) { return null; }
  }

  // Theme
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', state.theme);
    const icon = document.getElementById('themeIcon');
    if (state.theme === 'dark') {
      icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    } else {
      icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
    }
  }

  document.getElementById('themeBtn').onclick = async () => {
    state.theme = state.theme === 'light' ? 'dark' : 'light';
    applyTheme();
    await save();
  };

  // Menu
  const menu = document.getElementById('menu');
  const overlay = document.getElementById('menuOverlay');
  function openMenu() { menu.classList.add('open'); overlay.classList.add('open'); menu.setAttribute('aria-hidden','false'); }
  function closeMenu() { menu.classList.remove('open'); overlay.classList.remove('open'); menu.setAttribute('aria-hidden','true'); }
  document.getElementById('menuBtn').onclick = openMenu;
  document.getElementById('closeMenuBtn').onclick = closeMenu;
  overlay.onclick = closeMenu;

  function tabLabel(id) {
    if (id === 'resumo') return 'Resumo';
    if (id === 'todos') return 'Todos os itens';
    if (id === 'notas') return 'Minhas notas';
    return (CATEGORIES[id] || {name:id}).name;
  }

  function renderMenu() {
    const list = document.getElementById('menuList');
    const items = Object.values(state.items);

    const mainEntries = [
      { id: 'resumo', label: 'Resumo', icon: '◐', count: '' },
      { id: 'todos',  label: 'Todos os itens', icon: '≡', count: items.length },
      { id: 'notas',  label: 'Minhas notas', icon: '✎', count: state.notes.length },
    ];

    let html = `<div class="menu-section-title">Principal</div>`;
    html += mainEntries.map(e => `
      <button class="menu-item ${state.active === e.id ? 'active' : ''}" data-tab="${e.id}">
        <span class="mi-icon">${e.icon}</span>
        <span class="mi-label">${e.label}</span>
        ${e.count !== '' ? `<span class="mi-count">${e.count}</span>` : ''}
      </button>
    `).join('');

    html += `<div class="menu-section-title">Categorias</div>`;
    html += catsOrder.map(cid => {
      const cItems = items.filter(i => i.cat === cid);
      const checked = cItems.filter(i => i.checked).length;
      return `
        <button class="menu-item ${state.active === cid ? 'active' : ''}" data-tab="${cid}">
          <span class="mi-icon">${CATEGORIES[cid].icon}</span>
          <span class="mi-label">${CATEGORIES[cid].name}</span>
          <span class="mi-count">${checked}/${cItems.length}</span>
        </button>
      `;
    }).join('');

    list.innerHTML = html;
    list.querySelectorAll('.menu-item').forEach(btn => {
      btn.onclick = () => {
        state.active = btn.dataset.tab;
        closeMenu();
        render();
      };
    });
  }

  // Budget
  function renderBudget() {
    const spent = Object.values(state.items).filter(i=>i.checked).reduce((s,i)=>s+(i.price||0),0);
    document.getElementById('bSpent').textContent = 'R$ ' + formatBRL(spent);

    const banner = document.getElementById('budgetBanner');
    const input = document.getElementById('budgetInput');
    if (document.activeElement !== input) {
      input.value = state.budget ? formatBRL(state.budget) : '';
    }

    if (!state.budget) {
      document.getElementById('bTotal').textContent = '—';
      document.getElementById('bPct').textContent = '0%';
      document.getElementById('bRemaining').textContent = 'Defina um orçamento';
      document.getElementById('bFill').style.width = '0%';
      document.getElementById('bFill').className = 'budget-bar-fill';
      banner.classList.remove('over');
      return;
    }

    const pct = (spent / state.budget) * 100;
    const remaining = state.budget - spent;
    document.getElementById('bTotal').textContent = 'R$ ' + formatBRL(state.budget);
    document.getElementById('bPct').textContent = pct.toFixed(1) + '%';
    document.getElementById('bFill').style.width = Math.min(100, pct) + '%';

    const fill = document.getElementById('bFill');
    fill.className = 'budget-bar-fill';
    if (pct >= 100) fill.classList.add('danger');
    else if (pct >= 80) fill.classList.add('warn');

    if (remaining >= 0) {
      document.getElementById('bRemaining').innerHTML = `Restam <strong>R$ ${formatBRL(remaining)}</strong>`;
      banner.classList.remove('over');
    } else {
      document.getElementById('bRemaining').innerHTML = `Excedeu em <strong style="color:var(--danger)">R$ ${formatBRL(Math.abs(remaining))}</strong>`;
      banner.classList.add('over');
    }
  }

  document.getElementById('budgetInput').addEventListener('input', async (e) => {
    state.budget = parsePrice(e.target.value);
    renderBudget();
    await save();
  });
  document.getElementById('budgetInput').addEventListener('blur', () => renderBudget());

  // Items
  function renderItems() {
    const grid = document.getElementById('itemsGrid');
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    let items = Object.entries(state.items);
    if (state.active !== 'todos' && !['resumo','notas'].includes(state.active)) {
      items = items.filter(([_, i]) => i.cat === state.active);
    }
    if (search) items = items.filter(([_, i]) => i.name.toLowerCase().includes(search));

    items.sort((a, b) => {
      if (a[1].checked !== b[1].checked) return a[1].checked ? 1 : -1;
      return a[1].name.localeCompare(b[1].name, 'pt-BR');
    });

    if (items.length === 0) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="ico">◌</div><div>Nenhum item encontrado</div></div>`;
      return;
    }

    grid.innerHTML = items.map(([id, item]) => {
      const catData = CATEGORIES[item.cat] || { name: 'Outros', color: '#999' };
      return `
        <div class="item ${item.checked ? 'checked' : ''} fade-in" data-id="${id}">
          <label class="check">
            <input type="checkbox" ${item.checked ? 'checked' : ''} data-action="toggle" data-id="${id}">
            <span class="box">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </span>
          </label>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-cat" style="color:${catData.color}">${catData.name}</div>
          </div>
          <div class="price-input">
            <input type="text" inputmode="decimal" value="${item.price ? formatBRL(item.price) : ''}" placeholder="0,00" data-action="price" data-id="${id}">
          </div>
          <button class="remove-btn" data-action="remove" data-id="${id}" title="Remover">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
      `;
    }).join('');
  }

  function renderDonut(breakdown, total) {
    const svg = document.getElementById('donutSvg');
    const R = 42, CIRC = 2 * Math.PI * R;
    let offset = 0;
    const trackColor = getComputedStyle(document.documentElement).getPropertyValue('--surface-2').trim() || '#f4f5f7';
    svg.innerHTML = `<circle cx="50" cy="50" r="${R}" fill="none" stroke="${trackColor}" stroke-width="12"/>`;
    if (total === 0) return;
    breakdown.forEach(b => {
      if (b.value === 0) return;
      const frac = b.value / total;
      const len = frac * CIRC;
      const circ = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circ.setAttribute('cx',50); circ.setAttribute('cy',50); circ.setAttribute('r',R);
      circ.setAttribute('fill','none');
      circ.setAttribute('stroke', b.color);
      circ.setAttribute('stroke-width', 12);
      circ.setAttribute('stroke-dasharray', `${len} ${CIRC-len}`);
      circ.setAttribute('stroke-dashoffset', -offset);
      circ.setAttribute('transform','rotate(-90 50 50)');
      svg.appendChild(circ);
      offset += len;
    });
  }

  function renderResumo() {
    const items = Object.values(state.items);
    const checked = items.filter(i => i.checked);
    const totalGeral = checked.reduce((s,i) => s + (i.price || 0), 0);

    document.getElementById('bigTotal').textContent = formatBRL(totalGeral);
    document.getElementById('metaCount').textContent = checked.length;
    document.getElementById('metaAvg').textContent = 'R$ ' + formatBRL(checked.length ? totalGeral/checked.length : 0);

    const byCat = {};
    checked.forEach(i => {
      if (!byCat[i.cat]) byCat[i.cat] = { value: 0, count: 0 };
      byCat[i.cat].value += (i.price || 0);
      byCat[i.cat].count += 1;
    });
    const breakdown = Object.entries(byCat).map(([cid, d]) => ({
      id: cid,
      name: (CATEGORIES[cid] || { name: 'Outros' }).name,
      color: (CATEGORIES[cid] || { color: '#999' }).color,
      value: d.value, count: d.count,
      pct: totalGeral ? (d.value / totalGeral * 100) : 0
    })).sort((a,b) => b.value - a.value);

    document.getElementById('metaCats').textContent = breakdown.length;
    document.getElementById('donutNum').textContent = checked.length;

    renderDonut(breakdown, totalGeral);

    document.getElementById('legend').innerHTML = breakdown.length
      ? breakdown.map(b => `
          <div class="legend-row">
            <span class="sw" style="background:${b.color}"></span>
            <span class="name">${b.name}</span>
            <span class="pct">${b.pct.toFixed(1)}%</span>
          </div>`).join('')
      : `<div style="color:var(--text-mute);font-size:13px">Nenhum item com preço ainda</div>`;

    document.getElementById('breakdown').innerHTML = breakdown.length
      ? breakdown.map(b => `
          <div class="bar-row">
            <div class="bar-head">
              <span class="n">${b.name} <span style="color:var(--text-mute);font-weight:400">· ${b.count} ${b.count===1?'item':'itens'}</span></span>
              <span class="v"><strong>R$ ${formatBRL(b.value)}</strong>${b.pct.toFixed(1)}%</span>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${b.pct}%;background:${b.color}"></div></div>
          </div>`).join('')
      : `<div class="empty"><div class="ico">◐</div><div>Marque itens e adicione preços para ver o balanço</div></div>`;
  }

  // Notes
  function renderNotes() {
    const list = document.getElementById('notesList');
    if (state.notes.length === 0) {
      list.innerHTML = `<div class="empty"><div class="ico">✎</div><div>Nenhuma nota ainda.</div><div style="font-size:13px;margin-top:6px">Escreva itens que você quer lembrar de comprar.</div></div>`;
      return;
    }
    const sorted = [...state.notes].sort((a,b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return 0;
    });
    list.innerHTML = sorted.map(n => `
      <div class="note ${n.done ? 'done' : ''} fade-in" data-id="${n.id}">
        <label class="check">
          <input type="checkbox" ${n.done ? 'checked' : ''} data-action="note-toggle" data-id="${n.id}">
          <span class="box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
        </label>
        <input class="note-text" value="${(n.text || '').replace(/"/g,'&quot;')}" data-action="note-edit" data-id="${n.id}">
        <button class="remove-btn" data-action="note-remove" data-id="${n.id}" style="display:flex">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    `).join('');
  }

  function render() {
    const totalGeral = Object.values(state.items).filter(i=>i.checked).reduce((s,i)=>s+(i.price||0),0);
    document.getElementById('pillTotal').textContent = 'R$ ' + formatBRL(totalGeral);
    document.getElementById('currentTabLabel').textContent = tabLabel(state.active);

    renderMenu();
    renderBudget();

    ['resumo','items','notes'].forEach(v => {
      document.getElementById('view-' + v).classList.remove('active');
    });

    if (state.active === 'resumo') {
      document.getElementById('view-resumo').classList.add('active');
      renderResumo();
    } else if (state.active === 'notas') {
      document.getElementById('view-notes').classList.add('active');
      renderNotes();
    } else {
      document.getElementById('view-items').classList.add('active');
      renderItems();
    }
  }

  // Items handlers
  document.getElementById('itemsGrid').addEventListener('change', async (e) => {
    const t = e.target;
    if (t.dataset.action === 'toggle') {
      state.items[t.dataset.id].checked = t.checked;
      await save();
      render();
    }
  });
  document.getElementById('itemsGrid').addEventListener('input', async (e) => {
    const t = e.target;
    if (t.dataset.action === 'price') {
      state.items[t.dataset.id].price = parsePrice(t.value);
      const totalGeral = Object.values(state.items).filter(i=>i.checked).reduce((s,i)=>s+(i.price||0),0);
      document.getElementById('pillTotal').textContent = 'R$ ' + formatBRL(totalGeral);
      renderBudget();
      await save();
    }
  });
  document.getElementById('itemsGrid').addEventListener('blur', (e) => {
    const t = e.target;
    if (t.dataset.action === 'price') {
      const val = state.items[t.dataset.id].price;
      t.value = val ? formatBRL(val) : '';
    }
  }, true);
  document.getElementById('itemsGrid').addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-action="remove"]');
    if (btn) {
      delete state.items[btn.dataset.id];
      await save();
      render();
    }
  });
  document.getElementById('searchInput').addEventListener('input', () => renderItems());

  // Add item
  const addForm = document.getElementById('addForm');
  const newCat = document.getElementById('newCat');
  newCat.innerHTML = catsOrder.map(c => `<option value="${c}">${CATEGORIES[c].icon} ${CATEGORIES[c].name}</option>`).join('');
  document.getElementById('addBtn').onclick = () => {
    addForm.classList.toggle('open');
    if (addForm.classList.contains('open')) document.getElementById('newName').focus();
  };
  document.getElementById('cancelNew').onclick = () => {
    addForm.classList.remove('open');
    document.getElementById('newName').value = '';
  };
  document.getElementById('saveNew').onclick = async () => {
    const name = document.getElementById('newName').value.trim();
    if (!name) return;
    let id = slugify(name);
    if (state.items[id]) id = id + '-' + Date.now();
    state.items[id] = { name, cat: newCat.value, checked: false, price: 0 };
    document.getElementById('newName').value = '';
    addForm.classList.remove('open');
    await save();
    render();
  };
  document.getElementById('newName').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('saveNew').click();
  });

  document.getElementById('resetBtn').onclick = async () => {
    if (!confirm('Desmarcar todos os itens e zerar preços?')) return;
    Object.values(state.items).forEach(i => { i.checked = false; i.price = 0; });
    await save();
    render();
  };

  // Notes handlers
  async function addNote() {
    const input = document.getElementById('noteInput');
    const text = input.value.trim();
    if (!text) return;
    state.notes.unshift({ id: 'n-' + Date.now() + '-' + Math.random().toString(36).slice(2,6), text, done: false });
    input.value = '';
    await save();
    render();
  }
  document.getElementById('addNoteBtn').onclick = addNote;
  document.getElementById('noteInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addNote();
  });

  document.getElementById('notesList').addEventListener('change', async (e) => {
    const t = e.target;
    if (t.dataset.action === 'note-toggle') {
      const n = state.notes.find(n => n.id === t.dataset.id);
      if (n) { n.done = t.checked; await save(); render(); }
    }
  });
  document.getElementById('notesList').addEventListener('input', async (e) => {
    const t = e.target;
    if (t.dataset.action === 'note-edit') {
      const n = state.notes.find(n => n.id === t.dataset.id);
      if (n) { n.text = t.value; await save(); }
    }
  });
  document.getElementById('notesList').addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-action="note-remove"]');
    if (btn) {
      state.notes = state.notes.filter(n => n.id !== btn.dataset.id);
      await save();
      render();
    }
  });

  // Init
  (async function init() {
    const saved = await load();
    if (saved && saved.items && Object.keys(saved.items).length) {
      state.items = saved.items;
      state.notes = saved.notes || [];
      state.budget = saved.budget || 0;
      state.theme = saved.theme || 'light';
    } else {
      DEFAULT_ITEMS.forEach((name) => {
        const id = slugify(name);
        state.items[id] = { name, cat: ITEM_CAT[name] || 'mercearia', checked: false, price: 0 };
      });
    }
    applyTheme();
    state.active = 'todos';
    render();
  })();
</script>
</body>
</html>
